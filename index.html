<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOSITD8 - PR Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; color: #000; }
    .doc-container { max-width: 1000px; margin: 20px auto; background: #fff; padding: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px; }
    input, select, textarea { font-family: inherit; background: transparent; outline: none; width: 100%; }
    textarea { resize: none; overflow: hidden; }
    .input-line { border-bottom: 1px solid #9ca3af; padding: 2px 4px; }
    .input-line:focus { border-bottom: 2px solid #3b82f6; }
    .modal-bg { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }

    @media print {
      @page { size: A4; margin: 10mm; }
      body { background: #fff; }
      .doc-container { box-shadow: none; padding: 0; margin: 0; max-width: 100%; }
      .no-print { display: none !important; }

      #docType { display: none !important; }
      #printDocTitle {
        display: block !important;
        width: 100% !important;
        text-align: center !important;
        font-size: 24pt !important;
        font-weight: 800 !important;
        margin: 0 0 12px 0 !important;
      }

      .overflow-x-auto { overflow: visible !important; }
      textarea { resize: none !important; border: none !important; }
      table { width: 100% !important; border-collapse: collapse !important; table-layout: fixed; }
      th, td { border: 1px solid #000 !important; padding: 4px !important; word-wrap: break-word; vertical-align: top; }
      .input-line { border-bottom: 1px dotted #000 !important; }
      table input, table textarea { border: none !important; }
    }
  

/* ===== HEADER ALIGN (SCREEN + PRINT): Logo ขวา / หัวข้อกึ่งกลางทั้งหน้า ===== */
@media (min-width: 640px){
  #topHeader{ display:grid !important; grid-template-columns: 1fr auto 1fr !important; align-items:center !important; }
  #leftBlock{ grid-column: 1 !important; justify-self: start !important; }
  #titleBlock{ grid-column: 2 !important; justify-self: center !important; width:auto !important; }
  #logo-root{ grid-column: 3 !important; justify-self: end !important; width:auto !important; display:flex !important; justify-content:flex-end !important; }
}
@media print{
  #topHeader{ display:grid !important; grid-template-columns: 1fr auto 1fr !important; align-items:center !important; }
  #titleBlock{ grid-column: 2 !important; justify-self: center !important; width:auto !important; }
  #logo-root{ grid-column: 3 !important; justify-self: end !important; width:auto !important; display:flex !important; justify-content:flex-end !important; }
}



/* ===== LOGO SIZE (1.5x) ===== */
#logoImg{ height:72px; width:auto; }
@media print{ #logoImg{ height:18mm !important; width:auto !important; } }


/* ===== PRINT: STOCK COLUMNS ===== */
@media print{
  th.yn-col, td.yn-col{ width:8% !important; text-align:center !important; font-weight:700 !important; }
  th.stockqty-col, td.stockqty-col{ width:12% !important; text-align:center !important; }
}
</style>
</head>

<body class="p-2 sm:p-6">

  <!-- Loading -->
  <div id="loader" class="fixed inset-0 bg-gray-900/80 z-[9999] flex flex-col items-center justify-center hidden">
    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
    <p class="text-white font-bold">กำลังประมวลผล...</p>
  </div>

  <!-- Login -->
  <div id="loginOverlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm text-center">
      <h1 class="text-4xl font-extrabold text-blue-800 mb-4">KOSITD8</h1>
      <input type="text" id="loginUser" placeholder="Username" class="w-full border-2 p-3 rounded-lg mb-3 text-center focus:border-blue-500">
      <input type="password" id="loginPass" placeholder="Password" class="w-full border-2 p-3 rounded-lg mb-4 text-center focus:border-blue-500">
      <button onclick="doLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">เข้าสู่ระบบ</button>
      <button type="button" onclick="openSignup()" class="w-full mt-2 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700">สมัครสมาชิก</button>
      <div class="mt-4 text-xs text-gray-500 text-left bg-gray-50 p-2 rounded">
        <p><b>ทดสอบระบบ (รหัสผ่าน 123 ทุกอัน):</b></p>
        <p>admin (ผู้ดูแลระบบ) | factory (ฝ่ายโรงงาน)</p>
        <p>manager (ผู้อนุมัติ) | site (หน้างาน โครงการ A)</p>
        <p>user (ผู้เบิก โครงการ A)</p>
      </div>
    </div>
  </div>

  

<!-- Signup -->
<div id="signupOverlay" class="fixed inset-0 bg-slate-900 z-[101] flex items-center justify-center p-4 hidden">
  <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm text-center">
    <h2 class="text-3xl font-extrabold text-green-700 mb-4">สมัครสมาชิก</h2>
    <input type="text" id="suUser" placeholder="Username (a-z A-Z 0-9 _ อย่างน้อย 4 ตัว)" class="w-full border-2 p-3 rounded-lg mb-3 text-center focus:border-green-500">
    <input type="password" id="suPass" placeholder="Password (อย่างน้อย 6 ตัว)" class="w-full border-2 p-3 rounded-lg mb-3 text-center focus:border-green-500">
    <input type="text" id="suName" placeholder="ชื่อ-นามสกุล" class="w-full border-2 p-3 rounded-lg mb-3 text-center focus:border-green-500">
    <input type="text" id="suProj" placeholder="โครงการ (ถ้ามี เช่น โครงการ A)" class="w-full border-2 p-3 rounded-lg mb-4 text-center focus:border-green-500">
    <button type="button" onclick="doSignup()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700">สร้างบัญชี</button>
    <button type="button" onclick="closeSignup()" class="w-full mt-2 bg-gray-200 text-gray-800 font-bold py-3 rounded-lg hover:bg-gray-300">กลับไปหน้าเข้าสู่ระบบ</button>
    <p class="mt-3 text-xs text-gray-500 text-left bg-gray-50 p-2 rounded">* สมัครได้เฉพาะบทบาท <b>user</b> (บทบาทอื่นให้ admin เพิ่ม)</p>
  </div>
</div>

  <!-- Autocomplete -->
  <div id="autocomplete" class="absolute z-[9999] bg-white border shadow-xl hidden max-h-48 overflow-y-auto text-sm rounded"></div>

  <!-- Navbar -->
  <div class="max-w-[1000px] mx-auto mb-4 flex flex-col gap-3 no-print">
    <div class="flex justify-between items-center bg-white p-3 rounded-lg shadow-sm border">
      <div class="font-bold text-gray-800">👤 <span id="currUser"></span> <span id="roleBadge" class="text-[10px] text-white px-2 py-0.5 rounded bg-gray-500 ml-2"></span></div>
      <button onclick="doLogout()" class="text-red-500 font-bold hover:underline">ออกจากระบบ</button>
    </div>
    <div class="flex flex-wrap gap-2" id="navButtons"></div>
  </div>

  <!-- Main Form -->
  <div class="doc-container relative" id="printableArea">
    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4" id="topHeader" id="topHeader">
      <div class="w-full sm:w-1/4 no-print" id="leftBlock" id="leftBlock">
        <button id="btnPull" onclick="openPullModal()" class="hidden bg-blue-100 text-blue-700 border border-blue-500 px-4 py-2 rounded font-bold text-sm w-full">📥 ดึงข้อมูลใบเบิก</button>
      </div>
      <div class="w-full flex justify-center flex-col items-center" id="titleBlock">
        <select id="docType" onchange="changeDocType()" class="text-3xl font-bold text-center border-b-2 border-gray-300 pb-1 w-full focus:border-blue-500 no-print">
          <option value="ใบเบิกวัสดุ">ใบเบิกวัสดุ</option>
          <option value="ใบเบิกรถ">ใบเบิกรถ</option>
          <option value="ใบเบิกคนงาน">ใบเบิกคนงาน</option>
          <option value="ใบส่งคืนวัสดุ">ใบส่งคืนวัสดุ</option>
          <option value="ใบจัดส่งวัสดุ">ใบจัดส่งวัสดุ</option>
        </select>
        <div id="printDocTitle" class="hidden print:block text-2xl font-bold text-center w-full">ใบเบิกวัสดุ</div>
      </div>
      <div class="w-full sm:w-1/4 flex justify-end" id="logo-root"><img id="logoImg" alt="Logo" style="height:72px;width:auto;" /></div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 text-sm sm:text-base">
      <div class="flex flex-col gap-2">
        <div class="flex items-end"><label class="font-bold w-28">โครงการ:</label><input type="text" id="docProject" list="projList" class="flex-1 input-line font-bold text-blue-800 bg-blue-50/50 px-2"><datalist id="projList"></datalist></div>
        <div class="flex items-end"><label class="font-bold w-28">สถานที่ส่งมอบ:</label><input type="text" id="docLocation" class="flex-1 input-line"></div>
      </div>
      <div class="flex flex-col gap-2 sm:pl-8">
        <div class="flex items-end sm:justify-end"><label class="font-bold w-28 sm:w-auto sm:pr-2">วันที่:</label><input type="text" id="docDate" class="flex-1 sm:w-32 input-line sm:text-center"></div>
        <div class="flex items-end sm:justify-end"><label class="font-bold w-28 sm:w-auto sm:pr-2">เลขที่เอกสาร:</label><input type="text" id="docNo" readonly class="flex-1 sm:w-32 input-line sm:text-center font-bold text-red-600 print:text-black" placeholder="บันทึกร่าง"></div>
      </div>
    </div>

    <div id="extraFields" class="mb-4 text-sm hidden no-print bg-gray-50 p-3 rounded border"></div>

    <div class="overflow-x-auto mb-4">
      <table class="w-full border-collapse border border-black min-w-[700px]" id="mainTable">
        <thead class="bg-slate-800 text-white text-sm print:bg-gray-200 print:text-black" id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 no-print mb-10" id="actionButtons">
      <button onclick="addRow()" class="text-blue-700 font-bold hover:underline w-full sm:w-auto text-left">+ เพิ่มรายการ</button>
      <div class="flex gap-2 w-full sm:w-auto">
        <button onclick="clearForm()" class="bg-red-100 text-red-700 px-4 py-2 rounded font-bold hover:bg-red-200">ล้างข้อมูล</button>
        <button id="btnCancel" onclick="cancelEdit()" class="hidden bg-gray-500 text-white px-4 py-2 rounded font-bold hover:bg-gray-600">ยกเลิก/ปิด</button>
        <button id="btnDraft" onclick="saveDoc('draft')" class="bg-slate-200 px-4 py-2 rounded font-bold hover:bg-slate-300">💾 บันทึกร่าง</button>
        <button id="btnSave" onclick="saveDoc('submitted')" class="bg-blue-600 text-white px-6 py-2 rounded font-bold shadow-lg hover:bg-blue-700">🚀 ส่งเข้าระบบ</button>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-4 mt-16 mb-8 text-center text-sm">
      <div class="flex flex-col items-center">
        <div id="sig1Name" class="font-bold text-blue-800 print:text-black h-6"></div>
        <div class="border-b border-black w-32 mx-auto mb-1"></div>
        <span id="sig1Role">ผู้เบิก</span>
      </div>
      <div class="flex flex-col items-center opacity-0 print:opacity-100">
        <div class="font-bold h-6"></div>
        <div class="border-b border-black w-32 mx-auto mb-1"></div>
        <span>ผู้อนุมัติ</span>
      </div>
      <div class="flex flex-col items-center opacity-0 print:opacity-100">
        <div class="font-bold h-6"></div>
        <div class="border-b border-black w-32 mx-auto mb-1"></div>
        <span id="sig3Role">ผู้รับของ</span>
      </div>
    </div>

    <div class="text-center no-print border-t pt-4">
      <button onclick="window.print()" class="bg-green-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-green-700 shadow-lg">🖨️ สั่งพิมพ์</button>
    </div>
  </div>

  <!-- Generic Modal -->
  <div id="genericModal" class="fixed inset-0 modal-bg hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col">
      <div class="p-4 border-b flex justify-between items-center rounded-t-xl" id="modalHeader">
        <h2 class="font-bold text-lg text-white" id="modalTitle">Title</h2>
        <button onclick="closeModal('genericModal')" class="text-2xl text-white hover:text-gray-200">&times;</button>
      </div>
      <div class="p-3 bg-gray-50 border-b flex gap-2 items-center" id="modalToolbar"></div>
      <div class="p-4 overflow-y-auto flex-1 bg-white" id="modalContent"></div>
    </div>
  </div>

async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function openSignup(){
  document.getElementById('loginOverlay')?.classList.add('hidden');
  document.getElementById('signupOverlay')?.classList.remove('hidden');
}
function closeSignup(){
  document.getElementById('signupOverlay')?.classList.add('hidden');
  document.getElementById('loginOverlay')?.classList.remove('hidden');
}
async function doSignup(){
  const user = document.getElementById('suUser').value.trim();
  const pass = document.getElementById('suPass').value.trim();
  const name = document.getElementById('suName').value.trim();
  const proj = document.getElementById('suProj').value.trim();
  if(!/^[a-zA-Z0-9_]{4,}$/.test(user)) return alert('Username ต้องมีอย่างน้อย 4 ตัว และใช้ได้เฉพาะ a-z A-Z 0-9 _');
  if(pass.length < 6) return alert('Password ต้องยาวอย่างน้อย 6 ตัว');
  if(name.length < 2) return alert('กรุณากรอกชื่อ-นามสกุล');
  if(DB.users.some(u => u.user === user)) return alert('Username นี้ถูกใช้แล้ว');
  const passHash = await sha256(pass);
  DB.users.push({ user, passHash, name, role:'user', proj });
  saveLocal();
  alert('สมัครสมาชิกสำเร็จ ✅ กรุณาเข้าสู่ระบบ');
  closeSignup();
}

function onStockYNChange(sel){
  const tr = sel.closest('tr');
  if(!tr) return;
  const yn = String(sel.value||'').toUpperCase();
  const qty = tr.querySelector('.stockQty');
  if(qty){
    if(yn==='Y') qty.removeAttribute('readonly');
    else { qty.value=''; qty.setAttribute('readonly','readonly'); }
  }
}

function toggleLoader(show){
  const el = document.getElementById('loader');
  if(!el) return;
  el.classList.toggle('hidden', !show);
}
function escapeHtml(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function escapeJs(s){
  return String(s||'')
    .replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'")
    .replace(/"/g,'\\"')
    .replace(/\n/g,'\\n')
    .replace(/\r/g,'\\r');
}
async function apiGet(paramsObj){
  const qs = new URLSearchParams(paramsObj).toString();
  const res = await fetch(`${SCRIPT_URL}?${qs}`, { method:'GET', redirect:'follow' });
  return await res.json();
}
async function apiPost(bodyObj){
  const res = await fetch(SCRIPT_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify(bodyObj),
    redirect:'follow'
  });
  return await res.json();
}
async function safeApiCall(action, sheetName, dataPayload){
  try{
    if(!navigator.onLine) throw new Error('Offline');
    const result = await apiPost({ action, sheet: sheetName, ...dataPayload });
    if(result && result.success === false) throw new Error(result.error || 'API error');
    return result;
  }catch(e){
    console.warn('Offline/Backend error -> keep LocalStorage', e);
    return { success:false, error:String(e) };
  }
}

async function syncFromBackend(){
  if(!navigator.onLine) return;
  toggleLoader(true);
  try{
    const data = await apiGet({ resource:'readAll' });
    if(!data.ok) throw new Error(data.error || 'readAll failed');

    if(Array.isArray(data.users)){
      DB.users = data.users.map(u=>({
        user: String(u.user ?? u.username ?? '').trim(),
        pass: String(u.pass ?? u.password ?? '').trim(),
        name: String(u.name ?? '').trim(),
        role: String(u.role ?? '').trim(),
        proj: String(u.proj ?? '').trim()
      })).filter(x=>x.user);
    }
    if(Array.isArray(data.stock)){
      DB.stock = data.stock.map(s=>({
        code: String(s.code ?? s.item_code ?? '').trim(),
        name: String(s.name ?? s.item_name ?? '').trim(),
        size: String(s.size ?? '').trim(),
        unit: String(s.unit ?? '').trim(),
        price: Number(s.price ?? s.price_default ?? 0),
        supplier: String(s.supplier ?? '').trim(),
        img: String(s.img ?? s.image_url ?? '').trim(),
      })).filter(x=>x.name);
    }
    if(Array.isArray(data.emp)){
      DB.emp = data.emp.map(e=>({
        name: String(e.name ?? '').trim(),
        wage: Number(e.wage ?? e.price ?? 0)
      })).filter(x=>x.name);
    }
    if(Array.isArray(data.records)){
      DB.records = data.records.map(r=>{
        let items = [];
        try{ items = JSON.parse(r.items || '[]'); }catch{}
        return {
          id: String(r.id ?? '').trim(),
          user: String(r.user ?? '').trim(),
          date: String(r.date ?? '').trim(),
          proj: String(r.proj ?? '').trim(),
          type: String(r.type ?? '').trim(),
          items,
          status: String(r.status ?? '').trim(),
          docNo: String(r.docNo ?? '').trim(),
          exDriver: String(r.exDriver ?? '').trim(),
          exPlate: String(r.exPlate ?? '').trim(),
          exReceiver: String(r.exReceiver ?? '').trim(),
          refId: String(r.refId ?? '').trim(),
        };
      }).filter(x=>x.id);
    }

    saveLocal();
  }catch(e){
    console.warn('Sync failed, use local', e);
  }finally{
    toggleLoader(false);
  }
}

// ================= STOCK Y/N DISPLAY =================
function ynSummary(record){
  const items = record?.items || [];
  let y=0,n=0,na=0;
  items.forEach(it=>{
    const v = String(it.stockYN||'').toUpperCase();
    if(v==='Y') y++; else if(v==='N') n++; else na++;
  });
  if(items.length===0) return '';
  return `Y=${y} / N=${n}` + (na?` / - ${na}`:'');
}
function shouldShowStockCol(type, record){
  const t = String(type||'');
  const okType = (t==='ใบเบิกวัสดุ' || t==='ใบจัดส่งวัสดุ');
  const st = String(record?.status||'');
  return okType && ['manager_review','factory_price','delivered'].includes(st);
}

function getStockPriceByName(itemName){
  const s = DB.stock.find(x => (x.name||'').trim() === (itemName||'').trim());
  return s ? Number(s.price||0) : 0;
}
function statusLabel(st){
  switch(st){
    case 'draft': return '📝 ร่าง';
    case 'factory_check': return '🏭 รอ Factory เช็คสต๊อก';
    case 'manager_review': return '✅ รอ Manager อนุมัติ';
    case 'factory_price': return '💰 รอ Factory ใส่ราคา (N)';
    case 'delivered': return '🚚 จัดส่งแล้ว';
    default: return st || '-';
  }
}

async function syncSheetStock(){

function addRow(data = {}){
  const type = document.getElementById('docType').value;
  const showStockYN = shouldShowStockCol(type, currentViewRecord);
  const isDel = (type === 'ใบจัดส่งวัสดุ');
  const ro = isViewMode ? 'readonly' : '';

  const tr = document.createElement('tr');
  let td = `<td class="border px-1 py-1 text-center seq font-bold text-gray-500"></td>`;
  td += `<td class="border px-1 py-1"><textarea class="w-full item" rows="1" oninput="autoResize(this); updateSeq()" onfocus="showAuto(this)" data-price="${data.price||0}" ${ro}>${escapeHtml(data.name||'')}</textarea></td>`;
  td += `<td class="border px-1 py-1"><input type="number" class="w-full text-center qty" value="${escapeHtml(data.qty||'')}" ${ro}></td>`;

  if(isDel){
    td += `<td class="border px-1 py-1"><input type="number" class="w-full text-center del-qty text-green-600 font-bold" value="${escapeHtml(data.del||'')}" oninput="calcPend(this)" ${ro}></td>`;
    td += `<td class="border px-1 py-1"><input type="number" class="w-full text-center pend-qty text-red-600 font-bold" value="${escapeHtml(data.pend||'')}" readonly></td>`;
  }

  td += `<td class="border px-1 py-1"><input type="text" class="w-full text-center unit" value="${escapeHtml(data.unit||'')}" ${ro}></td>`;

if(showStockYN){
  const role = String(currentUser?.role||'').toLowerCase();
  const ynVal = String((data.stockYN||'')).toUpperCase();
  const qtyVal = (data.stockQty ?? '');
  const factoryEdit = (role==='factory' && !isViewMode);
  const managerQtyEdit = (role==='manager' && currentViewRecord && currentViewRecord.status==='manager_review' && ynVal==='Y');

  if(factoryEdit){
    td += `<td class="border px-1 py-1 text-center yn-col"><select class="stockYN text-center font-bold" onchange="onStockYNChange(this)">`
        + `<option value="" ${(!ynVal)?'selected':''}>-</option>`
        + `<option value="Y" ${(ynVal==='Y')?'selected':''}>Y</option>`
        + `<option value="N" ${(ynVal==='N')?'selected':''}>N</option>`
        + `</select></td>`;
  }else{
    td += `<td class="border px-1 py-1 text-center yn-col"><input type="text" class="stockYN w-full text-center font-bold" value="${escapeHtml(ynVal||'-')}" readonly></td>`;
  }

  const editable = factoryEdit || managerQtyEdit;
  const ro2 = editable ? '' : 'readonly';
  const roIfNotY = (ynVal==='Y') ? '' : 'readonly';
  td += `<td class="border px-1 py-1 text-center stockqty-col"><input type="number" min="0" class="stockQty w-full text-center" value="${escapeHtml(String(qtyVal))}" ${ro2} ${editable ? '' : roIfNotY} oninput="onStockQtyInput(this)"></td>`;
}
  td += `<td class="border px-1 py-1"><textarea class="w-full note" rows="1" oninput="autoResize(this)" ${ro}>${escapeHtml(data.note||'')}</textarea></td>`;

  if(!isViewMode){
    td += `<td class="border px-1 py-1 text-center no-print"><button onclick="this.closest('tr').remove(); updateSeq();" class="text-red-500 font-bold">&times;</button></td>`;
  }

  tr.innerHTML = td;
  document.getElementById('tableBody').appendChild(tr);
  updateSeq();
}

function updateSeq(){
  let count = 1;
  document.querySelectorAll('#tableBody tr').forEach(tr=>{
    const hasItem = tr.querySelector('.item').value.trim() !== '';
    tr.querySelector('.seq').innerText = hasItem ? count++ : '';
  });
}
function calcPend(input){
  const tr = input.closest('tr');
  const qty = parseFloat(tr.querySelector('.qty').value) || 0;
  const del = parseFloat(input.value) || 0;
  tr.querySelector('.pend-qty').value = Math.max(qty - del, 0);
}
function autoResize(el){ el.style.height='auto'; el.style.height = el.scrollHeight + 'px'; }
function clearForm(){ document.getElementById('tableBody').innerHTML=''; for(let i=0;i<3;i++) addRow(); }

// ================= SAVE DOC (workflow) =================
async function saveDoc(status){
  const proj = document.getElementById('docProject').value.trim();
  if(!proj) return alert('ระบุโครงการ');

  let items = [];
  document.querySelectorAll('#tableBody tr').forEach(tr=>{
    const name = tr.querySelector('.item').value.trim();
    if(name){
      let obj = {
        name,
        qty: tr.querySelector('.qty').value,
        unit: tr.querySelector('.unit').value,
        note: tr.querySelector('.note').value,
        price: Number(tr.querySelector('.item').dataset.price || 0),
        stockYN: (tr.querySelector('.stockYN') ? (tr.querySelector('.stockYN').value || tr.querySelector('.stockYN').textContent || '').trim() : ''),
        stockQty: (tr.querySelector('.stockQty') ? tr.querySelector('.stockQty').value : ''),
        priceFinal: ''
      };
      if(tr.querySelector('.del-qty')){ obj.del = tr.querySelector('.del-qty').value; obj.pend = tr.querySelector('.pend-qty').value; }
      items.push(obj);
    }
  });
  if(items.length === 0) return alert('เพิ่มรายการอย่างน้อย 1 รายการ');

  const type = document.getElementById('docType').value;
  let docNo = document.getElementById('docNo').value.trim();
  if(status === 'submitted' && !docNo){
    const year = new Date().getFullYear() + 543;
    const count = DB.records.filter(r => r.proj === proj && r.type === type && r.status !== 'draft').length + 1;
    docNo = `${String(count).padStart(3,'0')}/${year}`;
  }

  const rec = {
    id: currentEditId || Date.now().toString(),
    user: currentUser.name,
    proj,
    type,
    date: document.getElementById('docDate').value,
    docNo: status === 'draft' ? '' : docNo,
    status: status === 'draft' ? 'draft' : 'factory_check',
    items,
    exDriver: document.getElementById('exDriver')?.value || '',
    exPlate: document.getElementById('exPlate')?.value || '',
    exReceiver: document.getElementById('exReceiver')?.value || '',
    refId: currentPulledReqId || ''
  };

  if(currentEditId){
    const idx = DB.records.findIndex(r=>r.id === currentEditId);
    if(idx > -1) DB.records[idx] = rec;
  }else{
    DB.records.push(rec);
  }

  saveLocal();
  const res = await syncAfterChange('records');

  if(res?.success){
    alert(status === 'submitted' ? `ส่งเอกสาร ${docNo} แล้ว ✅ (เข้าคิว Factory เช็คสต๊อก)` : 'บันทึกร่างสำเร็จ ✅');
  } else {
    alert(status === 'submitted' ? `ส่งเอกสาร ${docNo} แล้ว (Local) — ยังไม่ sync` : 'บันทึกร่างแล้ว (Local)');
  }

  location.reload();
}

function renderHistory(){
  const proj = document.getElementById('histProj').value;
  let recs = DB.records;

  if(role === 'user' || role === 'project site') recs = recs.filter(r => r.proj === currentUser.proj);

  let html = `<table class="w-full text-sm border"><thead class="bg-gray-200"><tr><th class="p-2 border">เอกสาร</th><th class="p-2 border">โครงการ</th><th class="p-2 border">ประเภท</th><th class="p-2 border text-center">สถานะ</th><th class="p-2 border text-center">จัดการ</th></tr></thead><tbody>`;

  if(list.length === 0) html += `<tr><td colspan="5" class="text-center p-4 text-gray-500">ไม่มีข้อมูล</td></tr>`;
  else {
    html += list.map(r=>{

      const btnText = canEdit ? 'แก้ไข' : 'ดูรายละเอียด';
      return `<tr><td class="p-2 border font-bold">${escapeHtml(r.docNo||'Draft')}<br><span class="text-xs text-gray-500 font-normal">${escapeHtml(r.date||'')}</span></td><td class="p-2 border">${escapeHtml(r.proj||'')}</td><td class="p-2 border">${escapeHtml(r.type||'')}</td><td class="p-2 border text-center"><span class="font-bold">${ynSummary(r)}</span></td><td class="p-2 border text-center">${statusLabel(r.status)}<br><span class="text-xs text-gray-500">${shouldShowStockCol(r.type,r) ? ("Stock: "+ynSummary(r)) : ""}</span></td><td class="p-2 border text-center"><button onclick="viewOrEditDoc('${escapeJs(r.id)}')" class="text-blue-600 underline font-bold">${btnText}</button></td></tr>`;
    }).join('');
  }
  html += `</tbody></table>`;
  document.getElementById('histContent').innerHTML = html;
}

function viewOrEditDoc(id){
  const r = DB.records.find(x=>x.id === id);
  currentViewRecord = r;
  currentViewRecord = r;
  if(!r) return alert('ไม่พบเอกสาร');

  currentEditId = id;
  isViewMode = !(r.status === 'draft' && r.user === currentUser.name);

  document.getElementById('docType').value = r.type; changeDocType();
  document.getElementById('docProject').value = r.proj;
  document.getElementById('docDate').value = r.date;
  document.getElementById('docNo').value = r.docNo || '';

  if(document.getElementById('exDriver') && r.exDriver) document.getElementById('exDriver').value = r.exDriver;
  if(document.getElementById('exPlate') && r.exPlate) document.getElementById('exPlate').value = r.exPlate;
  if(document.getElementById('exReceiver') && r.exReceiver) document.getElementById('exReceiver').value = r.exReceiver;

  document.getElementById('tableBody').innerHTML = '';
  (r.items||[]).forEach(i => addRow(i));
  setTimeout(()=>{ document.querySelectorAll('textarea.item, textarea.note').forEach(ta=>autoResize(ta)); }, 10);

  document.getElementById('btnCancel').classList.remove('hidden');
  if(isViewMode){
    document.getElementById('btnSave').classList.add('hidden');
    document.getElementById('btnDraft').classList.add('hidden');
    const addBtn = document.querySelector('button[onclick="addRow()"]');
    if(addBtn) addBtn.classList.add('hidden');
    document.getElementById('btnCancel').innerText = 'ปิดหน้าต่าง';
  }else{
    document.getElementById('btnSave').classList.remove('hidden');
    document.getElementById('btnDraft').classList.remove('hidden');
    const addBtn = document.querySelector('button[onclick="addRow()"]');
    if(addBtn) addBtn.classList.remove('hidden');
    document.getElementById('btnCancel').innerText = 'ยกเลิก/ปิด';
  }

  closeModal('genericModal');
}

// ================= FACTORY WORKFLOW =================
function openFactory(){
  const tb = `<button onclick="renderFactoryCheck()" class="bg-orange-200 px-3 py-1 rounded font-bold hover:bg-orange-300">✅ เช็คสต๊อก (Y/N)</button><button onclick="renderFactoryPrice()" class="bg-orange-200 px-3 py-1 rounded font-bold hover:bg-orange-300">💰 ใส่ราคา (หลังอนุมัติ)</button>`;
  openModal('📑 Factory Dashboard', '<div id="facContent"></div>', 'bg-orange-600', tb);
  renderFactoryCheck();
}

function renderFactoryCheck(){
  const reqs = DB.records.filter(r => r.status === 'factory_check');
  let html = `<div class="text-sm text-gray-600 mb-2">* ต้องเลือก Y/N ให้ครบทุกบรรทัดก่อนส่งให้ผู้อนุมัติ</div><table class="w-full text-sm border"><thead class="bg-orange-50"><tr><th class="p-2 border">เอกสาร</th><th class="p-2 border">โครงการ</th><th class="p-2 border">รายการ</th><th class="p-2 border text-center">จำนวน</th><th class="p-2 border text-center">Stock Y/N</th><th class="p-2 border text-center">ส่งอนุมัติ</th></tr></thead><tbody>`;
  if(reqs.length===0) html += `<tr><td colspan="6" class="p-4 text-center text-gray-500">ไม่มีรายการรอเช็คสต๊อก</td></tr>`;
  else {
    reqs.forEach(r=>{
      (r.items||[]).forEach((it,idx)=>{
        const yn = it.stockYN || '';
        html += `<tr><td class="p-2 border font-bold text-red-600">${idx===0?(escapeHtml(r.docNo||'Draft')):''}</td><td class="p-2 border">${idx===0?escapeHtml(r.proj||''):''}</td><td class="p-2 border">${escapeHtml(it.name||'')}</td><td class="p-2 border text-center">${escapeHtml(it.qty||'')} ${escapeHtml(it.unit||'')}</td><td class="p-2 border text-center"><select class="border p-1 rounded" id="yn_${r.id}_${idx}"><option value="" ${yn===''?'selected':''}>-</option><option value="Y" ${yn==='Y'?'selected':''}>Y</option><option value="N" ${yn==='N'?'selected':''}>N</option></select></td><td class="p-2 border text-center">${idx===0?`<button class="bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold" onclick="factorySendToManager('${escapeJs(r.id)}')">ส่งให้ผู้อนุมัติ</button>`:''}</td></tr>`;
      });
    });
  }
  html += `</tbody></table>`;
  document.getElementById('facContent').innerHTML = html;
}

async function factorySendToManager(id){
  const r = DB.records.find(x=>x.id===id);
  if(!r) return alert('ไม่พบเอกสาร');

  r.items.forEach((it,idx)=>{
    const sel = document.getElementById(`yn_${id}_${idx}`);
    it.stockYN = sel ? sel.value : '';
  });

  const incomplete = r.items.some(it => !['Y','N'].includes(it.stockYN));
  if(incomplete) return alert('กรุณาเช็ค Stock Y/N ให้ครบทุกบรรทัดก่อน');

  // ถ้า Y เติมราคา final จากสต๊อกไว้ก่อน
  r.items.forEach(it=>{
    if(it.stockYN==='Y') it.priceFinal = getStockPriceByName(it.name);
  });

  r.status = 'manager_review';
  saveLocal();
  const res = await syncAfterChange('records');
  if(!res?.success) alert('ส่งต่อ (Local) แล้ว แต่ยังไม่ sync: ' + (res?.error||''));
  renderFactoryCheck();
}

function renderFactoryPrice(){
  const reqs = DB.records.filter(r => r.status === 'factory_price');
  let html = `<div class="text-sm text-gray-600 mb-2">* รายการ Y ใช้ราคาสต๊อกอัตโนมัติ / รายการ N ให้กรอกราคา</div><table class="w-full text-sm border"><thead class="bg-orange-50"><tr><th class="p-2 border">เอกสาร</th><th class="p-2 border">โครงการ</th><th class="p-2 border">รายการ</th><th class="p-2 border text-center">Y/N</th><th class="p-2 border text-center">ราคา</th><th class="p-2 border text-center">บันทึก</th></tr></thead><tbody>`;
  if(reqs.length===0) html += `<tr><td colspan="6" class="p-4 text-center text-gray-500">ไม่มีรายการรอใส่ราคา</td></tr>`;
  else {
    reqs.forEach(r=>{
      r.items.forEach((it,idx)=>{
        const autoPrice = (it.stockYN === 'Y') ? getStockPriceByName(it.name) : '';
        const val = (it.stockYN === 'Y') ? autoPrice : (it.priceFinal || '');
        const ro = (it.stockYN === 'Y') ? 'readonly' : '';
        html += `<tr><td class="p-2 border font-bold text-red-600">${idx===0?escapeHtml(r.docNo||'Draft'):''}</td><td class="p-2 border">${idx===0?escapeHtml(r.proj||''):''}</td><td class="p-2 border">${escapeHtml(it.name||'')}</td><td class="p-2 border text-center">${escapeHtml(it.stockYN||'')}</td><td class="p-2 border text-center"><input type="number" class="border p-1 rounded w-28 text-center ${ro?'bg-gray-100':''}" id="pf_${r.id}_${idx}" value="${val}" ${ro}></td><td class="p-2 border text-center">${idx===0?`<button class="bg-green-600 text-white px-2 py-1 rounded text-xs font-bold" onclick="factoryConfirmPrice('${escapeJs(r.id)}')">ยืนยันราคา</button>`:''}</td></tr>`;
      });
    });
  }
  html += `</tbody></table>`;
  document.getElementById('facContent').innerHTML = html;
}

async function factoryConfirmPrice(id){
  const r = DB.records.find(x=>x.id===id);
  if(!r) return alert('ไม่พบเอกสาร');

  for(let idx=0; idx<r.items.length; idx++){
    const it = r.items[idx];
    if(it.stockYN === 'Y'){
      it.priceFinal = getStockPriceByName(it.name);
    } else if(it.stockYN === 'N'){
      const input = document.getElementById(`pf_${id}_${idx}`);
      const v = Number(input?.value||0);
      if(!v) return alert('กรุณากรอกราคาให้รายการ N ให้ครบ');
      it.priceFinal = v;
    } else {
      return alert('พบรายการที่ยังไม่กำหนด Y/N กรุณากลับไปเช็คสต๊อกก่อน');
    }
  }

  r.status = 'delivered';
  saveLocal();
  const res = await syncAfterChange('records');
  if(!res?.success) alert('ยืนยันราคา (Local) แล้ว แต่ยังไม่ sync: ' + (res?.error||''));
  renderFactoryPrice();
}

function renderStock(){

async function saveStock(){
  const name = document.getElementById('sName')?.value?.trim();
  if(!name) return alert('กรอกชื่อรายการ');
  DB.stock.push({
    code: (document.getElementById('sCode')?.value||'').trim(),
    name,
    size: (document.getElementById('sSize')?.value||'').trim(),
    unit: (document.getElementById('sUnit')?.value||'').trim(),
    price: Number(document.getElementById('sPrice')?.value||0),
    supplier: (document.getElementById('sSup')?.value||'').trim(),
    img: (document.getElementById('sImg')?.value||'').trim(),
  });
  saveLocal();
  const res = await syncAfterChange('stock');
  if(res?.success) renderStock();
  else alert('บันทึกสต๊อกไม่สำเร็จ: ' + (res?.error||''));
}

async function delStock(i){
  if(!confirm('ลบรายการสต๊อกนี้?')) return;
  DB.stock.splice(i,1);
  saveLocal();
  const res = await syncAfterChange('stock');
  if(res?.success) renderStock();
}

function addFromStock(name, unit, price){
  addRow({name, unit, price});
  closeModal('genericModal');
}

// ================= SUMMARY =================
function openSummary(){
  const role = (currentUser?.role||'').toLowerCase();
  let sum = {};
  DB.records.filter(r => r.status === 'delivered').forEach(r=>{
    if(role === 'project site' && r.proj !== currentUser.proj) return;
    if(!sum[r.proj]) sum[r.proj] = { mat:0, labor:0, veh:0 };

    (r.items||[]).forEach(i=>{
      const qty = Number(i.qty||0);
      const priceUsed = i.stockYN === 'Y' ? getStockPriceByName(i.name) : Number(i.priceFinal||0);
      const cost = qty * priceUsed;
      if(r.type === 'ใบเบิกวัสดุ' || r.type === 'ใบจัดส่งวัสดุ') sum[r.proj].mat += cost;
      else if(r.type === 'ใบเบิกคนงาน') sum[r.proj].labor += cost;
      else if(r.type === 'ใบเบิกรถ') sum[r.proj].veh += cost;
    });
  });

  let html = `<table class="w-full text-sm border"><thead class="bg-indigo-100"><tr><th class="p-2 border">โครงการ</th><th class="p-2 border text-right">ค่าวัสดุ (฿)</th><th class="p-2 border text-right">ค่าแรง (฿)</th><th class="p-2 border text-right">ค่ารถ (฿)</th><th class="p-2 border text-right font-bold">รวม (฿)</th></tr></thead><tbody>`;
  const keys = Object.keys(sum);
  if(keys.length === 0) html += `<tr><td colspan="5" class="text-center p-4 text-gray-500">ยังไม่มีข้อมูลต้นทุนที่จัดส่งแล้ว</td></tr>`;
  else {
    keys.forEach(k=>{
      const total = sum[k].mat + sum[k].labor + sum[k].veh;
      html += `<tr><td class="p-2 border font-bold">${escapeHtml(k)}</td><td class="p-2 border text-right text-amber-700">${sum[k].mat.toLocaleString()}</td><td class="p-2 border text-right text-teal-700">${sum[k].labor.toLocaleString()}</td><td class="p-2 border text-right text-blue-700">${sum[k].veh.toLocaleString()}</td><td class="p-2 border text-right font-bold text-red-600">${total.toLocaleString()}</td></tr>`;
    });
  }
  html += `</tbody></table>`;
  openModal('📊 สรุปต้นทุนโครงการ', html, 'bg-indigo-600');
}
