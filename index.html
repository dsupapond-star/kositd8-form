<!DOCTYPE html>

      th, td { border: 1px solid #000 !important; padding: 4px !important; word-wrap: break-word; vertical-align: top; }

</head>

<script>
// ================= CONFIG =================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuApKMXOL4xuyKdLhJVhAx8IYr5n-L6mrCL8g1N88cC6EPsLQvZBaHDMcNW86FsF4fgg/exec';

// ================= HELPERS =================
function toggleLoader(show){
  const el = document.getElementById('loader');
  if(!el) return;
  el.classList.toggle('hidden', !show);
}
function escapeHtml(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function escapeJs(s){
  return String(s||'')
    .replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'")
    .replace(/"/g,'\\"')
    .replace(/\n/g,'\\n')
    .replace(/\r/g,'\\r');
}
async function apiGet(paramsObj){
  const qs = new URLSearchParams(paramsObj).toString();
  const res = await fetch(`${SCRIPT_URL}?${qs}`, { method:'GET', redirect:'follow' });
  return await res.json();
}
async function apiPost(bodyObj){
  const res = await fetch(SCRIPT_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify(bodyObj),
    redirect:'follow'
  });
  return await res.json();
}
async function safeApiCall(action, sheetName, dataPayload){
  try{
    if(!navigator.onLine) throw new Error('Offline');
    const result = await apiPost({ action, sheet: sheetName, ...dataPayload });
    if(result && result.success === false) throw new Error(result.error || 'API error');
    return result;
  }catch(e){
    console.warn('Offline/Backend error -> keep LocalStorage', e);
    return { success:false, error:String(e) };
  }
}

// ================= DB =================
let DB = { users:[], stock:[], emp:[], records:[] };
let currentUser = null;
let currentEditId = null;
let currentPulledReqId = null;
let currentAutocompleteInput = null;
let isViewMode = false;

function initDB(){
  if(!localStorage.getItem('kos_users')){
    localStorage.setItem('kos_users', JSON.stringify([
      {user:'admin', pass:'123', name:'ผู้ดูแลระบบ', role:'admin', proj:''},
      {user:'factory', pass:'123', name:'ฝ่ายโรงงาน', role:'admin factory', proj:''},
      {user:'manager', pass:'123', name:'ผู้จัดการ', role:'manager', proj:''},
      {user:'site', pass:'123', name:'วิศวกรไซต์ A', role:'project site', proj:'โครงการ A'},
      {user:'user', pass:'123', name:'ช่างทั่วไป A', role:'user', proj:'โครงการ A'}
    ]));
    localStorage.setItem('kos_stock', JSON.stringify([
      {code:'M01', name:'ปูนซีเมนต์', size:'50kg', unit:'ถุง', price:120, supplier:'SCG', img:''},
      {code:'M02', name:'เหล็กเส้น', size:'9mm', unit:'เส้น', price:150, supplier:'Tata', img:''}
    ]));
    localStorage.setItem('kos_emp', JSON.stringify([{name:'สมชาย', wage:500}]));
    localStorage.setItem('kos_records', JSON.stringify([]));
  }
  DB.users = JSON.parse(localStorage.getItem('kos_users')) || [];
  DB.stock = JSON.parse(localStorage.getItem('kos_stock')) || [];
  DB.emp = JSON.parse(localStorage.getItem('kos_emp')) || [];
  DB.records = JSON.parse(localStorage.getItem('kos_records')) || [];
  refreshProjList();
}
function saveLocal(){
  localStorage.setItem('kos_users', JSON.stringify(DB.users));
  localStorage.setItem('kos_stock', JSON.stringify(DB.stock));
  localStorage.setItem('kos_emp', JSON.stringify(DB.emp));
  localStorage.setItem('kos_records', JSON.stringify(DB.records));
  refreshProjList();
}
function refreshProjList(){
  document.getElementById('projList').innerHTML = [...new Set(DB.records.map(r=>r.proj))]
    .filter(Boolean)
    .map(p=>`<option value="${escapeHtml(p)}">`).join('');
}

async function syncFromBackend(){
  if(!navigator.onLine) return;
  toggleLoader(true);
  try{
    const data = await apiGet({ resource:'readAll' });
    if(!data.ok) throw new Error(data.error || 'readAll failed');

    if(Array.isArray(data.users)){
      DB.users = data.users.map(u=>({
        user: String(u.user ?? u.username ?? '').trim(),
        pass: String(u.pass ?? u.password ?? '').trim(),
        name: String(u.name ?? '').trim(),
        role: String(u.role ?? '').trim(),
        proj: String(u.proj ?? '').trim()
      })).filter(x=>x.user);
    }
    if(Array.isArray(data.stock)){
      DB.stock = data.stock.map(s=>({
        code: String(s.code ?? s.item_code ?? '').trim(),
        name: String(s.name ?? s.item_name ?? '').trim(),
        size: String(s.size ?? '').trim(),
        unit: String(s.unit ?? '').trim(),
        price: Number(s.price ?? s.price_default ?? 0),
        supplier: String(s.supplier ?? '').trim(),
        img: String(s.img ?? s.image_url ?? '').trim(),
      })).filter(x=>x.name);
    }
    if(Array.isArray(data.emp)){
      DB.emp = data.emp.map(e=>({
        name: String(e.name ?? '').trim(),
        wage: Number(e.wage ?? e.price ?? 0)
      })).filter(x=>x.name);
    }
    if(Array.isArray(data.records)){
      DB.records = data.records.map(r=>{
        let items = [];
        try{ items = JSON.parse(r.items || '[]'); }catch{}
        return {
          id: String(r.id ?? '').trim(),
          user: String(r.user ?? '').trim(),
          date: String(r.date ?? '').trim(),
          proj: String(r.proj ?? '').trim(),
          type: String(r.type ?? '').trim(),
          items,
          status: String(r.status ?? '').trim(),
          docNo: String(r.docNo ?? '').trim(),
          exDriver: String(r.exDriver ?? '').trim(),
          exPlate: String(r.exPlate ?? '').trim(),
          exReceiver: String(r.exReceiver ?? '').trim(),
          refId: String(r.refId ?? '').trim(),
        };
      }).filter(x=>x.id);
    }

    saveLocal();
  }catch(e){
    console.warn('Sync failed, use local', e);
  }finally{
    toggleLoader(false);
  }
}

// ================= AUTH =================
function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const user = DB.users.find(x => x.user === u && x.pass === p);
  if(user){ localStorage.setItem('kos_active_user', JSON.stringify(user)); location.reload(); }
  else alert('รหัสผ่านผิด');
}
function doLogout(){ localStorage.removeItem('kos_active_user'); location.reload(); }

// ================= MODAL =================
function openModal(title, contentHtml, colorClass='bg-gray-800', toolbarHtml=''){
  document.getElementById('modalHeader').className = `p-4 border-b flex justify-between items-center rounded-t-xl ${colorClass}`;
  document.getElementById('modalTitle').innerText = title;
  document.getElementById('modalToolbar').innerHTML = toolbarHtml;
  document.getElementById('modalToolbar').classList.toggle('hidden', toolbarHtml === '');
  document.getElementById('modalContent').innerHTML = contentHtml;
  document.getElementById('genericModal').classList.remove('hidden');
}
function closeModal(id){ document.getElementById(id).classList.add('hidden'); }

// ================= WORKFLOW HELPERS =================
function getStockPriceByName(itemName){
  const s = DB.stock.find(x => (x.name||'').trim() === (itemName||'').trim());
  return s ? Number(s.price||0) : 0;
}
function statusLabel(st){
  switch(st){
    case 'draft': return '📝 ร่าง';
    case 'factory_check': return '🏭 รอ Factory เช็คสต๊อก';
    case 'manager_review': return '✅ รอ Manager อนุมัติ';
    case 'factory_price': return '💰 รอ Factory ใส่ราคา (N)';
    case 'delivered': return '🚚 จัดส่งแล้ว';
    default: return st || '-';
  }
}

async function syncSheetRecords(){
  const rows = [
    ['id','user','date','proj','type','items','status','docNo','exDriver','exPlate','exReceiver','refId'],
    ...DB.records.map(r=>[
      r.id, r.user, r.date, r.proj, r.type,
      JSON.stringify(r.items||[]),
      r.status, r.docNo||'',
      r.exDriver||'', r.exPlate||'', r.exReceiver||'', r.refId||''
    ])
  ];
  return await safeApiCall('writeAll','Records',{ rows });
}
async function syncSheetStock(){
  const rows = [
    ['code','name','size','unit','price','supplier','img'],
    ...DB.stock.map(s=>[s.code||'',s.name||'',s.size||'',s.unit||'',Number(s.price||0),s.supplier||'',s.img||''])
  ];
  return await safeApiCall('writeAll','Stock',{ rows });
}
async function syncSheetEmp(){
  const rows = [
    ['name','wage'],
    ...DB.emp.map(e=>[e.name||'',Number(e.wage||0)])
  ];
  return await safeApiCall('writeAll','Emp',{ rows });
}
async function syncAfterChange(kind){
  toggleLoader(true);
  try{
    if(kind==='records') return await syncSheetRecords();
    if(kind==='stock') return await syncSheetStock();
    if(kind==='emp') return await syncSheetEmp();
    return {success:true};
  } finally {
    toggleLoader(false);
  }
}

// ================= UI SETUP =================
function setupUI(){
  document.getElementById('currUser').innerText = currentUser.name;
  document.getElementById('roleBadge').innerText = (currentUser.role||'').toUpperCase();
  document.getElementById('sig1Name').innerText = currentUser.name;

  if(currentUser.proj){
    document.getElementById('docProject').value = currentUser.proj;
    document.getElementById('docProject').readOnly = true;
  }

  const role = (currentUser.role||'').toLowerCase();
  let btns = '';
  btns += `<button onclick="openStock()" class="bg-amber-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow">📦 สต๊อกวัสดุ</button>`;

  if(role === 'admin' || role === 'admin factory'){
    btns += `<button onclick="openEmp()" class="bg-teal-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow">👥 พนักงาน</button>`;
    btns += `<button onclick="openFactory()" class="bg-orange-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow">📑 จัดการงาน (Factory)</button>`;
  }
  if(role === 'admin' || role === 'manager'){
    btns += `<button onclick="openManager()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow">✅ อนุมัติงาน (Manager)</button>`;
  }
  if(role !== 'user'){
    btns += `<button onclick="openSummary()" class="bg-indigo-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow">📊 สรุปต้นทุน</button>`;
  }
  btns += `<button onclick="openHistory()" class="bg-gray-800 text-white px-3 py-1.5 rounded text-sm font-bold shadow">📂 ประวัติ/ติดตาม</button>`;
  document.getElementById('navButtons').innerHTML = btns;

  const docType = document.getElementById('docType');
  docType.innerHTML = `<option value="ใบเบิกวัสดุ">ใบเบิกวัสดุ</option><option value="ใบเบิกรถ">ใบเบิกรถ</option><option value="ใบเบิกคนงาน">ใบเบิกคนงาน</option><option value="ใบส่งคืนวัสดุ">ใบส่งคืนวัสดุ</option>`;
  if(['admin','admin factory','manager'].includes(role)) docType.innerHTML += `<option value="ใบจัดส่งวัสดุ">ใบจัดส่งวัสดุ</option>`;

  changeDocType();
}

// ================= FORM LOGIC =================
function changeDocType(){
  const type = document.getElementById('docType').value;
  document.getElementById('printDocTitle').innerText = type;
  document.getElementById('btnPull').classList.toggle('hidden', type !== 'ใบจัดส่งวัสดุ' && type !== 'ใบส่งคืนวัสดุ');

  let extra = document.getElementById('extraFields');
  extra.innerHTML = ''; extra.classList.add('hidden');

  if(type === 'ใบเบิกรถ' || type === 'ใบจัดส่งวัสดุ'){
    extra.innerHTML = `<div class="flex gap-4"><div class="flex-1"><label class="font-bold">คนขับ:</label><input type="text" id="exDriver" class="input-line bg-white" ${isViewMode?'readonly':''}></div><div class="flex-1"><label class="font-bold">ทะเบียน:</label><input type="text" id="exPlate" class="input-line bg-white" ${isViewMode?'readonly':''}></div></div>`;
    extra.classList.remove('hidden');
  } else if(type === 'ใบส่งคืนวัสดุ'){
    extra.innerHTML = `<div><label class="font-bold">ผู้รับคืน (โรงงาน):</label><input type="text" id="exReceiver" class="input-line bg-white" ${isViewMode?'readonly':''}></div>`;
    extra.classList.remove('hidden');
  }

  document.getElementById('sig1Role').innerText = (type === 'ใบจัดส่งวัสดุ') ? 'ผู้จัดส่ง' : 'ผู้เบิก';
  document.getElementById('sig3Role').innerText = (type === 'ใบส่งคืนวัสดุ') ? 'รง.รับคืน' : 'ผู้รับของ';

  let wItem = type === 'ใบจัดส่งวัสดุ' ? 'w-[40%]' : 'w-[30%]';
  let wNote = type === 'ใบจัดส่งวัสดุ' ? 'w-[10%]' : 'w-[20%]';

  let th = `<th class="border px-1 py-2 w-[5%]">ลำดับ</th><th class="border px-2 py-2 ${wItem}">รายการ</th><th class="border px-1 py-2 w-[10%]">จำนวน</th>`;
  if(type === 'ใบจัดส่งวัสดุ'){
    th += `<th class="border px-1 py-2 w-[10%] text-green-300 print:text-black">จัดส่ง</th><th class="border px-1 py-2 w-[10%] text-red-300 print:text-black">คงค้าง</th>`;
  }
  th += `<th class="border px-1 py-2 w-[10%]">หน่วย</th><th class="border px-2 py-2 ${wNote}">หมายเหตุ</th>`;
  if(!isViewMode) th += `<th class="border px-1 py-2 w-[5%] no-print">ลบ</th>`;

  document.getElementById('tableHead').innerHTML = `<tr>${th}</tr>`;

  if(!currentEditId && !currentPulledReqId && !isViewMode){
    document.getElementById('tableBody').innerHTML = '';
    for(let i=0;i<3;i++) addRow();
  }
}

function addRow(data = {}){
  const type = document.getElementById('docType').value;
  const isDel = (type === 'ใบจัดส่งวัสดุ');
  const ro = isViewMode ? 'readonly' : '';

  const tr = document.createElement('tr');
  let td = `<td class="border px-1 py-1 text-center seq font-bold text-gray-500"></td>`;
  td += `<td class="border px-1 py-1"><textarea class="w-full item" rows="1" oninput="autoResize(this); updateSeq()" onfocus="showAuto(this)" data-price="${data.price||0}" ${ro}>${escapeHtml(data.name||'')}</textarea></td>`;
  td += `<td class="border px-1 py-1"><input type="number" class="w-full text-center qty" value="${escapeHtml(data.qty||'')}" ${ro}></td>`;

  if(isDel){
    td += `<td class="border px-1 py-1"><input type="number" class="w-full text-center del-qty text-green-600 font-bold" value="${escapeHtml(data.del||'')}" oninput="calcPend(this)" ${ro}></td>`;
    td += `<td class="border px-1 py-1"><input type="number" class="w-full text-center pend-qty text-red-600 font-bold" value="${escapeHtml(data.pend||'')}" readonly></td>`;
  }

  td += `<td class="border px-1 py-1"><input type="text" class="w-full text-center unit" value="${escapeHtml(data.unit||'')}" ${ro}></td>`;
  td += `<td class="border px-1 py-1"><textarea class="w-full note" rows="1" oninput="autoResize(this)" ${ro}>${escapeHtml(data.note||'')}</textarea></td>`;

  if(!isViewMode){
    td += `<td class="border px-1 py-1 text-center no-print"><button onclick="this.closest('tr').remove(); updateSeq();" class="text-red-500 font-bold">&times;</button></td>`;
  }

  tr.innerHTML = td;
  document.getElementById('tableBody').appendChild(tr);
  updateSeq();
}

function updateSeq(){
  let count = 1;
  document.querySelectorAll('#tableBody tr').forEach(tr=>{
    const hasItem = tr.querySelector('.item').value.trim() !== '';
    tr.querySelector('.seq').innerText = hasItem ? count++ : '';
  });
}
function calcPend(input){
  const tr = input.closest('tr');
  const qty = parseFloat(tr.querySelector('.qty').value) || 0;
  const del = parseFloat(input.value) || 0;
  tr.querySelector('.pend-qty').value = Math.max(qty - del, 0);
}
function autoResize(el){ el.style.height='auto'; el.style.height = el.scrollHeight + 'px'; }
function clearForm(){ document.getElementById('tableBody').innerHTML=''; for(let i=0;i<3;i++) addRow(); }

function showAuto(input){
  if(isViewMode) return;
  currentAutocompleteInput = input;
  const type = document.getElementById('docType').value;
  let list = type === 'ใบเบิกคนงาน' ? DB.emp.map(e=>({name:e.name, unit:'วัน', price:e.wage})) : DB.stock;

  const div = document.getElementById('autocomplete');
  div.innerHTML = list.map(x => `
    <div class="p-2 border-b cursor-pointer hover:bg-blue-50 flex items-center gap-2" onmousedown="selectAuto('${escapeJs(x.name)}','${escapeJs(x.unit||'')}',${Number(x.price||0)})">
      ${x.img ? `<img src="${x.img}" class="w-8 h-8 object-cover rounded">` : `<div class="w-8 h-8 bg-gray-200 rounded flex items-center justify-center text-[10px]">No Pic</div>`}
      <div>
        <div class="font-bold">${escapeHtml(x.name)} <span class="text-xs text-gray-500 font-normal">(${escapeHtml(x.unit||'')})</span></div>
        <div class="text-xs text-gray-400">รหัส: ${escapeHtml(x.code||'-')} | ขนาด: ${escapeHtml(x.size||'-')} | Sup: ${escapeHtml(x.supplier||'-')}</div>
      </div>
    </div>`).join('');

  const rect = input.getBoundingClientRect();
  div.style.left = rect.left + 'px';
  div.style.top = (rect.bottom + window.scrollY) + 'px';
  div.style.width = Math.max(rect.width, 300) + 'px';
  div.classList.remove('hidden');
}
function selectAuto(name, unit, price){
  if(currentAutocompleteInput){
    currentAutocompleteInput.value = name;
    const tr = currentAutocompleteInput.closest('tr');
    if(tr.querySelector('.unit')) tr.querySelector('.unit').value = unit;
    currentAutocompleteInput.dataset.price = price;
    autoResize(currentAutocompleteInput);
    updateSeq();
  }
  document.getElementById('autocomplete').classList.add('hidden');
}
document.addEventListener('mousedown', e=>{
  if(!e.target.closest('#autocomplete') && !e.target.classList.contains('item')){
    document.getElementById('autocomplete').classList.add('hidden');
  }
});

// ================= SAVE DOC (workflow) =================
async function saveDoc(status){
  const proj = document.getElementById('docProject').value.trim();
  if(!proj) return alert('ระบุโครงการ');

  let items = [];
  document.querySelectorAll('#tableBody tr').forEach(tr=>{
    const name = tr.querySelector('.item').value.trim();
    if(name){
      let obj = {
        name,
        qty: tr.querySelector('.qty').value,
        unit: tr.querySelector('.unit').value,
        note: tr.querySelector('.note').value,
        price: Number(tr.querySelector('.item').dataset.price || 0),
        stockYN: '',
        priceFinal: ''
      };
      if(tr.querySelector('.del-qty')){ obj.del = tr.querySelector('.del-qty').value; obj.pend = tr.querySelector('.pend-qty').value; }
      items.push(obj);
    }
  });
  if(items.length === 0) return alert('เพิ่มรายการอย่างน้อย 1 รายการ');

  const type = document.getElementById('docType').value;
  let docNo = document.getElementById('docNo').value.trim();
  if(status === 'submitted' && !docNo){
    const year = new Date().getFullYear() + 543;
    const count = DB.records.filter(r => r.proj === proj && r.type === type && r.status !== 'draft').length + 1;
    docNo = `${String(count).padStart(3,'0')}/${year}`;
  }

  const rec = {
    id: currentEditId || Date.now().toString(),
    user: currentUser.name,
    proj,
    type,
    date: document.getElementById('docDate').value,
    docNo: status === 'draft' ? '' : docNo,
    status: status === 'draft' ? 'draft' : 'factory_check',
    items,
    exDriver: document.getElementById('exDriver')?.value || '',
    exPlate: document.getElementById('exPlate')?.value || '',
    exReceiver: document.getElementById('exReceiver')?.value || '',
    refId: currentPulledReqId || ''
  };

  if(currentEditId){
    const idx = DB.records.findIndex(r=>r.id === currentEditId);
    if(idx > -1) DB.records[idx] = rec;
  }else{
    DB.records.push(rec);
  }

  saveLocal();
  const res = await syncAfterChange('records');

  if(res?.success){
    alert(status === 'submitted' ? `ส่งเอกสาร ${docNo} แล้ว ✅ (เข้าคิว Factory เช็คสต๊อก)` : 'บันทึกร่างสำเร็จ ✅');
  } else {
    alert(status === 'submitted' ? `ส่งเอกสาร ${docNo} แล้ว (Local) — ยังไม่ sync` : 'บันทึกร่างแล้ว (Local)');
  }

  location.reload();
}

function viewOrEditDoc(id){
  const r = DB.records.find(x=>x.id === id);
  if(!r) return alert('ไม่พบเอกสาร');

  currentEditId = id;
  isViewMode = !(r.status === 'draft' && r.user === currentUser.name);

  document.getElementById('docType').value = r.type; changeDocType();
  document.getElementById('docProject').value = r.proj;
  document.getElementById('docDate').value = r.date;
  document.getElementById('docNo').value = r.docNo || '';

  if(document.getElementById('exDriver') && r.exDriver) document.getElementById('exDriver').value = r.exDriver;
  if(document.getElementById('exPlate') && r.exPlate) document.getElementById('exPlate').value = r.exPlate;
  if(document.getElementById('exReceiver') && r.exReceiver) document.getElementById('exReceiver').value = r.exReceiver;

  document.getElementById('tableBody').innerHTML = '';
  (r.items||[]).forEach(i => addRow(i));
  setTimeout(()=>{ document.querySelectorAll('textarea.item, textarea.note').forEach(ta=>autoResize(ta)); }, 10);

  document.getElementById('btnCancel').classList.remove('hidden');
  if(isViewMode){
    document.getElementById('btnSave').classList.add('hidden');
    document.getElementById('btnDraft').classList.add('hidden');
    const addBtn = document.querySelector('button[onclick="addRow()"]');
    if(addBtn) addBtn.classList.add('hidden');
    document.getElementById('btnCancel').innerText = 'ปิดหน้าต่าง';
  }else{
    document.getElementById('btnSave').classList.remove('hidden');
    document.getElementById('btnDraft').classList.remove('hidden');
    const addBtn = document.querySelector('button[onclick="addRow()"]');
    if(addBtn) addBtn.classList.remove('hidden');
    document.getElementById('btnCancel').innerText = 'ยกเลิก/ปิด';
  }

  closeModal('genericModal');
}

async function factorySendToManager(id){
  const r = DB.records.find(x=>x.id===id);
  if(!r) return alert('ไม่พบเอกสาร');

  r.items.forEach((it,idx)=>{
    const sel = document.getElementById(`yn_${id}_${idx}`);
    it.stockYN = sel ? sel.value : '';
  });

  const incomplete = r.items.some(it => !['Y','N'].includes(it.stockYN));
  if(incomplete) return alert('กรุณาเช็ค Stock Y/N ให้ครบทุกบรรทัดก่อน');

  // ถ้า Y เติมราคา final จากสต๊อกไว้ก่อน
  r.items.forEach(it=>{
    if(it.stockYN==='Y') it.priceFinal = getStockPriceByName(it.name);
  });

  r.status = 'manager_review';
  saveLocal();
  const res = await syncAfterChange('records');
  if(!res?.success) alert('ส่งต่อ (Local) แล้ว แต่ยังไม่ sync: ' + (res?.error||''));
  renderFactoryCheck();
}

function renderFactoryPrice(){
  const reqs = DB.records.filter(r => r.status === 'factory_price');
  let html = `<div class="text-sm text-gray-600 mb-2">* รายการ Y ใช้ราคาสต๊อกอัตโนมัติ / รายการ N ให้กรอกราคา</div><table class="w-full text-sm border"><thead class="bg-orange-50"><tr><th class="p-2 border">เอกสาร</th><th class="p-2 border">โครงการ</th><th class="p-2 border">รายการ</th><th class="p-2 border text-center">Y/N</th><th class="p-2 border text-center">ราคา</th><th class="p-2 border text-center">บันทึก</th></tr></thead><tbody>`;
  if(reqs.length===0) html += `<tr><td colspan="6" class="p-4 text-center text-gray-500">ไม่มีรายการรอใส่ราคา</td></tr>`;
  else {
    reqs.forEach(r=>{
      r.items.forEach((it,idx)=>{
        const autoPrice = (it.stockYN === 'Y') ? getStockPriceByName(it.name) : '';
        const val = (it.stockYN === 'Y') ? autoPrice : (it.priceFinal || '');
        const ro = (it.stockYN === 'Y') ? 'readonly' : '';
        html += `<tr><td class="p-2 border font-bold text-red-600">${idx===0?escapeHtml(r.docNo||'Draft'):''}</td><td class="p-2 border">${idx===0?escapeHtml(r.proj||''):''}</td><td class="p-2 border">${escapeHtml(it.name||'')}</td><td class="p-2 border text-center">${escapeHtml(it.stockYN||'')}</td><td class="p-2 border text-center"><input type="number" class="border p-1 rounded w-28 text-center ${ro?'bg-gray-100':''}" id="pf_${r.id}_${idx}" value="${val}" ${ro}></td><td class="p-2 border text-center">${idx===0?`<button class="bg-green-600 text-white px-2 py-1 rounded text-xs font-bold" onclick="factoryConfirmPrice('${escapeJs(r.id)}')">ยืนยันราคา</button>`:''}</td></tr>`;
      });
    });

  html += `</tbody></table>`;
  document.getElementById('facContent').innerHTML = html;

async function factoryConfirmPrice(id){
  const r = DB.records.find(x=>x.id===id);
  if(!r) return alert('ไม่พบเอกสาร');

  for(let idx=0; idx<r.items.length; idx++){
    const it = r.items[idx];
    if(it.stockYN === 'Y'){
      it.priceFinal = getStockPriceByName(it.name);
    } else if(it.stockYN === 'N'){
      const input = document.getElementById(`pf_${id}_${idx}`);
      const v = Number(input?.value||0);
      if(!v) return alert('กรุณากรอกราคาให้รายการ N ให้ครบ');
      it.priceFinal = v;
    } else {
      return alert('พบรายการที่ยังไม่กำหนด Y/N กรุณากลับไปเช็คสต๊อกก่อน');
    }
  }

  r.status = 'delivered';
  saveLocal();
  const res = await syncAfterChange('records');
  if(!res?.success) alert('ยืนยันราคา (Local) แล้ว แต่ยังไม่ sync: ' + (res?.error||''));
  renderFactoryPrice();
}

  const isFac = ['admin','admin factory'].includes((currentUser?.role||'').toLowerCase());
  let html = `<table class="w-full text-sm border"><thead class="bg-gray-200"><tr><th class="p-2 border w-16">รูป</th><th class="p-2 border">รหัส</th><th class="p-2 border">ชื่อรายการ</th><th class="p-2 border">ขนาด</th><th class="p-2 border">หน่วย</th><th class="p-2 border">Supplier</th><th class="p-2 border">ราคา</th><th class="p-2 border text-center">จัดการ</th></tr></thead><tbody>`;
  html += DB.stock.map((s,i)=>`<tr><td class="p-2 border text-center">${s.img ? `<a href="${s.img}" target="_blank" rel="noopener"><img src="${s.img}" class="w-10 h-10 object-cover mx-auto rounded"/></a>` : '-'}</td><td class="p-2 border">${escapeHtml(s.code||'-')}</td><td class="p-2 border font-bold">${escapeHtml(s.name||'')}</td><td class="p-2 border">${escapeHtml(s.size||'-')}</td><td class="p-2 border">${escapeHtml(s.unit||'-')}</td><td class="p-2 border">${escapeHtml(s.supplier||'-')}</td><td class="p-2 border text-right">${Number(s.price||0).toLocaleString()}</td><td class="p-2 border text-center"><button onclick="addFromStock('${escapeJs(s.name)}','${escapeJs(s.unit||'')}',${Number(s.price||0)})" class="text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded text-xs mb-1 block w-full">เพิ่มลงใบเบิก</button>${isFac?`<button onclick="delStock(${i})" class="text-red-500 font-bold bg-red-50 px-2 py-1 rounded text-xs w-full">ลบ</button>`:''}</td></tr>`).join('');
  html += `</tbody></table>`;
  document.getElementById('stockContent').innerHTML = html;
}

async function saveStock(){
  const name = document.getElementById('sName')?.value?.trim();
  if(!name) return alert('กรอกชื่อรายการ');
  DB.stock.push({
    code: (document.getElementById('sCode')?.value||'').trim(),
    name,
    size: (document.getElementById('sSize')?.value||'').trim(),
    unit: (document.getElementById('sUnit')?.value||'').trim(),
    price: Number(document.getElementById('sPrice')?.value||0),
    supplier: (document.getElementById('sSup')?.value||'').trim(),
    img: (document.getElementById('sImg')?.value||'').trim(),
  });
  saveLocal();
  const res = await syncAfterChange('stock');
  if(res?.success) renderStock();
  else alert('บันทึกสต๊อกไม่สำเร็จ: ' + (res?.error||''));
}

async function delStock(i){
  if(!confirm('ลบรายการสต๊อกนี้?')) return;
  DB.stock.splice(i,1);
  saveLocal();
  const res = await syncAfterChange('stock');
  if(res?.success) renderStock();
}

function addFromStock(name, unit, price){
  addRow({name, unit, price});
  closeModal('genericModal');
}

// ================= EMP =================
function openEmp(){
  const tb = `<div class="flex gap-2 w-full"><input type="text" id="eName" placeholder="ชื่อพนักงาน" class="border p-1 rounded flex-1"><input type="number" id="eWage" placeholder="ค่าแรง" class="border p-1 rounded w-24"><button onclick="saveEmp()" class="bg-teal-600 text-white px-2 py-1 rounded font-bold">เพิ่ม</button></div>`;
  openModal('👥 ฐานข้อมูลพนักงาน', '<div id="empContent"></div>', 'bg-teal-600', tb);
  renderEmp();
}
function renderEmp(){
  let html = `<table class="w-full text-sm border"><thead class="bg-gray-200"><tr><th class="p-2 border">ชื่อพนักงาน</th><th class="p-2 border">ค่าแรง</th><th class="p-2 border text-center">จัดการ</th></tr></thead><tbody>`;
  html += DB.emp.map((e,i)=>`<tr><td class="p-2 border">${escapeHtml(e.name)}</td><td class="p-2 border text-right">${Number(e.wage||0).toLocaleString()}</td><td class="p-2 border text-center"><button onclick="delEmp(${i})" class="text-red-500 font-bold">ลบ</button></td></tr>`).join('');
  html += `</tbody></table>`;
  document.getElementById('empContent').innerHTML = html;
}
async function saveEmp(){
  const name = document.getElementById('eName')?.value?.trim();
  if(!name) return alert('กรอกชื่อพนักงาน');
  const wage = Number(document.getElementById('eWage')?.value||0);
  DB.emp.push({name, wage});
  saveLocal();
  const res = await syncAfterChange('emp');
  if(res?.success) renderEmp();
  else alert('บันทึกพนักงานไม่สำเร็จ: ' + (res?.error||''));
}
async function delEmp(i){
  if(!confirm('ลบพนักงานนี้?')) return;
  DB.emp.splice(i,1);
  saveLocal();
  const res = await syncAfterChange('emp');
  if(res?.success) renderEmp();
}

// ================= SUMMARY =================
function openSummary(){
  const role = (currentUser?.role||'').toLowerCase();
  let sum = {};
  DB.records.filter(r => r.status === 'delivered').forEach(r=>{
    if(role === 'project site' && r.proj !== currentUser.proj) return;
    if(!sum[r.proj]) sum[r.proj] = { mat:0, labor:0, veh:0 };

    (r.items||[]).forEach(i=>{
      const qty = Number(i.qty||0);
      const priceUsed = i.stockYN === 'Y' ? getStockPriceByName(i.name) : Number(i.priceFinal||0);
      const cost = qty * priceUsed;
      if(r.type === 'ใบเบิกวัสดุ' || r.type === 'ใบจัดส่งวัสดุ') sum[r.proj].mat += cost;
      else if(r.type === 'ใบเบิกคนงาน') sum[r.proj].labor += cost;
      else if(r.type === 'ใบเบิกรถ') sum[r.proj].veh += cost;
    });
  });

  let html = `<table class="w-full text-sm border"><thead class="bg-indigo-100"><tr><th class="p-2 border">โครงการ</th><th class="p-2 border text-right">ค่าวัสดุ (฿)</th><th class="p-2 border text-right">ค่าแรง (฿)</th><th class="p-2 border text-right">ค่ารถ (฿)</th><th class="p-2 border text-right font-bold">รวม (฿)</th></tr></thead><tbody>`;
  const keys = Object.keys(sum);
  if(keys.length === 0) html += `<tr><td colspan="5" class="text-center p-4 text-gray-500">ยังไม่มีข้อมูลต้นทุนที่จัดส่งแล้ว</td></tr>`;
  else {
    keys.forEach(k=>{
      const total = sum[k].mat + sum[k].labor + sum[k].veh;
      html += `<tr><td class="p-2 border font-bold">${escapeHtml(k)}</td><td class="p-2 border text-right text-amber-700">${sum[k].mat.toLocaleString()}</td><td class="p-2 border text-right text-teal-700">${sum[k].labor.toLocaleString()}</td><td class="p-2 border text-right text-blue-700">${sum[k].veh.toLocaleString()}</td><td class="p-2 border text-right font-bold text-red-600">${total.toLocaleString()}</td></tr>`;
    });
  }
  html += `</tbody></table>`;
  openModal('📊 สรุปต้นทุนโครงการ', html, 'bg-indigo-600');
}
